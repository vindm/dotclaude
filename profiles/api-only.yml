name: api-only
description: Backend / headless services. No UI concerns.
hooks:
  - check-file-size
  - check-forbidden-phrases
  - check-import-boundary
  - git-context-sessionstart
  - auto-lint-posttool
  - check-no-todo-comments
  - check-secret-leak
  - check-no-console-log
rules:
  - file-discipline
  - database-query-discipline
skills:
  - decompose-file
agents:
  - pre-flight
  - code-reviewer
defaults:
  fileSize:
    ceiling: 1200
    warn: 1100
  forbiddenPhrases:
    phrases:
      - "As an AI language model"
    scopes:
      - "*/src/**/*.ts"
  database: postgres
